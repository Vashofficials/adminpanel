  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJsorrGKIgn2WoWP22VDCF1Utr8-Y1eqI"></script>
  <script>
    window.geocodeAddress = function (address) {
      return new Promise((resolve, reject) => {
        if (!google || !google.maps || !google.maps.Geocoder) {
          reject("Google Maps API not loaded yet");
          return;
        }
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: address }, (results, status) => {
          if (status === 'OK' && results[0]) {
            const loc = results[0];
            let city = "";
            let state = "";
            let postalCode = "";
            if (loc.address_components) {
              loc.address_components.forEach(comp => {
                if (comp.types.includes("locality")) city = comp.long_name;
                if (comp.types.includes("administrative_area_level_1")) state = comp.long_name;
                if (comp.types.includes("postal_code")) postalCode = comp.long_name;
              });
            }
            const boundsInfo = loc.geometry.viewport;
            const resultData = {
              lat: loc.geometry.location.lat(),
              lng: loc.geometry.location.lng(),
              northeastLat: boundsInfo ? boundsInfo.getNorthEast().lat() : null,
              northeastLng: boundsInfo ? boundsInfo.getNorthEast().lng() : null,
              southwestLat: boundsInfo ? boundsInfo.getSouthWest().lat() : null,
              southwestLng: boundsInfo ? boundsInfo.getSouthWest().lng() : null,
              city: city,
              state: state,
              postalCode: postalCode,
              formatted_address: loc.formatted_address
            };
            resolve(JSON.stringify(resultData));
          } else {
            reject('Geocoding failed: ' + status);
          }
        });
      });
    };
  </script>




</head>
